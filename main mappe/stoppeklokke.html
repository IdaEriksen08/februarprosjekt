<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stoppeklokke.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Stoppeklokke</title>
</head>

<body>
     <header>
    <div id="logodiv">
      <button id="mknapp">☰</button>
      <div class="logo">🎮 NovaGames</div>

    </div>
    <nav>
      <div class="ikon"><i class="fa-regular fa-bell"></i></div>
      <div class="ikon"><i class="fa-regular fa-heart"></i></div>
      <p>Logg inn</p>
    </nav>
  </header>


  <aside id="sidebar">
    <div class="container">
        <div id="Hjemmeside">
          <i class="fa-solid fa-house"></i>
          <p>Hjemmeside</p>
        </div>
      <div>
        <i class="fa-solid fa-clock"></i>
        <p>Klokke</p>
      </div>
      <div>
        <i class="fa-solid fa-gamepad"></i>
        <p>Alle spill</p>
      </div>
      <div>
        <i class="fa-solid fa-star"></i>
        <p>Favoritter</p>
      </div>
      <div>
        <i class="fa-solid fa-fire"></i>
        <p>Mest populære</p>
      </div>
      <div>
        <i class="fa-solid fa-people-group"></i>
        <p>Venner</p>
      </div>
      <div>
        <i class="fa-solid fa-diamond"></i>
        <p>Kortspill</p>
      </div>
      <div>
        <i class="fa-solid fa-dice"></i>
        <p>Gjett tallet</p>
      </div>
      <div>
        <i class="fa-solid fa-dice-six"></i>
        <p>Tre på rad</p>
      </div>
      <div>
        <i class="fa-solid fa-headset"></i>
        <p>Andre spill</p>
      </div>
    </div>
  </aside>

    <div class="main">
        <div id="display">00:00:00</div>
        <button onclick="start()">Start</button>
        <button onclick="stopp()">Stopp</button>
        <button onclick="reset()">Reset</button>
    </div>




    <script src="stoppeklokke.js"></script>

</body>

</html>
